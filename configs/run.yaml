# FILE MAP | Per-run config for train.py. Layers on configs/base.yaml (shared hyperparams).
#   Change `run.model` to pick which model trains; every model uses the same protocol so
#   results are directly comparable. train.py reads this file; --dry-run validates it offline.
#   Tags: [TWEAK] safe to change  ·  [DO NOT TOUCH] path contract with evaluate.py + nb 05.

base_config: base.yaml   # [DO NOT TOUCH] sibling in configs/; merged first, run/output below override

run:
  model: medsam            # [TWEAK] unet | sam_lora | medsam  (medsam = ViT-B, ~375MB, T4-friendly)
  seed: 42                 # [TWEAK]
  epochs: 50               # [TWEAK] caps training length
  batch_size: 4            # [TWEAK] 4 fits SAM/MedSAM on a T4; raise for U-Net
  lr: 5.0e-5               # [TWEAK]
  patience: 8              # [TWEAK] early-stop after N epochs without val-Dice gain
  max_train_minutes: null  # [TWEAK] wall-clock cap (null = disabled); measures/limits cost

output:
  checkpoint_dir: checkpoints                                        # [DO NOT TOUCH] best.pt lives here
  local_results_dir: results                                         # [TWEAK] local metrics/overlays/log
  drive_results_dir: /content/drive/MyDrive/msu2026_checkpoints/results  # [CHANGE ME] your Drive results path
  drive_checkpoint_dir: /content/drive/MyDrive/msu2026_checkpoints  # [CHANGE ME] your Drive checkpoint root; benchmark nb 05 reads this layout
  n_overlay_samples: 8                                               # [TWEAK] overlays saved per split
  overlay_splits:                                                    # [TWEAK] which splits to sample
    - seen_kvasir
    - cvc_colondb
